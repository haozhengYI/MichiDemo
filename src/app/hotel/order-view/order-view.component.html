
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Order</title>
  <!-- Latest compiled and minified CSS -->
  <link rel="stylesheet" href="assets/vendor-bootstrap4/bootstrap.min.css">
  <script src="assets/vendor-bootstrap4/jquery.slim.min.js"></script>
  <script src="assets/vendor-bootstrap4/popper.min.js"></script>
  <script src="assets/vendor-bootstrap4/bootstrap.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-default">
        <div class="container-fluid">
          <div class="navbar-header">
            <a class="navbar-brand">Hotels</a>
            <a class="navbar-brand">login in as {{userId}}</a>
            <a class="navbar-brand" href="/">Logout</a>
          </div>
        </div>
      </nav>
  <h1> Your Booking </h1>
  <div id="accordion" class="accordion">
    <div *ngIf="orders.length > 0">
      <div *ngFor="let order of orders">
        <div class="card">
          <div class="card-header" id="headingOne">
            <h5 class="mb-0">
              <button class="btn btn-link" data-toggle="collapse" data-target="#collapseOne" aria-expanded="true" aria-controls="collapseOne">
                Hotel Name : {{order.hotelName}}
              </button>
            </h5>
          </div>

          <div id="collapseOne" class="collapse show" aria-labelledby="headingOne" data-parent="#accordion">
            <div class="card-body">
              <li>Date : {{order.date}}</li>
              <li>First Name : {{order.firstName}} </li>
              <li>Last Name : {{order.lastName}}</li>
              <li>Contact Phone : {{order.phone}}</li>
              <li>User Account : {{order.userId}}</li>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
